[io]
name = "Assimilation."
[io.output]
save = true
type = "interval"           # "interval"
# quantity = 100
interval_duration = 86_400  # seconds
directory = "assimilation_sw_qg_2l"

[physics]
rho = 1000
slip_coef = 1.0
f0 = 9.375e-5           # mean coriolis (s^-1)
beta = 1.754e-11                # coriolis gradient (m^-1 s^-1)
bottom_drag_coefficient = 3.60577e-8
Ro = 0.1

[simulation]
type = "assimilation"
duration = 31_536_000       # seconds
dt = 1800                   # seconds
fork_interval = 1_728_000   # seconds
[simulation.startup]
file ="data/double_gyre_long_final.pt"
config ="data/double_gyre_long_config.toml"

[simulation.reference]
type = "model-output"
prefix = "reference_step_"
folder = "/srv/storage/ithaca@storage2.rennes.g5000.fr/grigaut/qgsw/sw_double_gyre_long_hr"

[model]
type = "QG"
prefix = "results_step_"
name = "QG-2L"
layers = [
    400,1100
]
reduced_gravity = [
    9.81,0.025
]
[space]
nx = 256
ny = 512
unit = "m"
x_min = 0
x_max = 2_560_000
y_min = 0
y_max = 5_120_000

[windstress]
type = "cosine"
magnitude = 0.08
drag_coefficient = 0.0013

[perturbation]
type = "none"
perturbation_magnitude = 1e-3
